<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="ui-sans-serif,system-ui,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="hm-brain" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="hm-backend" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <marker id="hm-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="hm-arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="980" height="620" fill="#f8fafc"/>

  <!-- Title -->
  <text x="490" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">harness manager — v0.9.0</text>
  <text x="490" y="62" text-anchor="middle" font-size="13" fill="#475569">manifest-driven adapter system: verb subcommands, interactive TUI, cross-platform Python backend</text>

  <!-- Layer 1: Verb subcommands (3 columns) -->
  <g transform="translate(0,90)">
    <text x="40" y="0" font-size="12" font-weight="600" fill="#334155">USER COMMANDS</text>

    <!-- Column 1: bare wizard -->
    <g transform="translate(40,12)">
      <rect width="280" height="92" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">first-time onboarding</text>
      <text x="140" y="44" text-anchor="middle" font-size="13" fill="#0f172a" font-family="ui-monospace,Menlo,monospace">./install.sh</text>
      <text x="140" y="64" text-anchor="middle" font-size="10" fill="#64748b">multi-select wizard</text>
      <text x="140" y="78" text-anchor="middle" font-size="10" fill="#64748b">auto-detects existing harnesses</text>
    </g>

    <!-- Column 2: named install -->
    <g transform="translate(350,12)">
      <rect width="280" height="92" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">scriptable verbs</text>
      <text x="140" y="42" text-anchor="middle" font-size="11" fill="#0f172a" font-family="ui-monospace,Menlo,monospace">./install.sh add &lt;name&gt;</text>
      <text x="140" y="58" text-anchor="middle" font-size="11" fill="#0f172a" font-family="ui-monospace,Menlo,monospace">./install.sh remove · doctor · status</text>
      <text x="140" y="78" text-anchor="middle" font-size="10" fill="#64748b">CI-safe · idempotent · tracked</text>
    </g>

    <!-- Column 3: manage TUI -->
    <g transform="translate(660,12)">
      <rect width="280" height="92" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">interactive TUI</text>
      <text x="140" y="44" text-anchor="middle" font-size="13" fill="#0f172a" font-family="ui-monospace,Menlo,monospace">./install.sh manage</text>
      <text x="140" y="64" text-anchor="middle" font-size="10" fill="#64748b">menu loop · header pane</text>
      <text x="140" y="78" text-anchor="middle" font-size="10" fill="#64748b">add · remove · doctor · status</text>
    </g>
  </g>

  <!-- Arrows down to backend -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 180 220 L 280 250" marker-end="url(#hm-arr)"/>
    <path d="M 490 220 L 490 250" marker-end="url(#hm-arr)"/>
    <path d="M 800 220 L 700 250" marker-end="url(#hm-arr)"/>
  </g>

  <!-- Layer 2: Backend -->
  <g transform="translate(0,250)">
    <text x="40" y="0" font-size="12" font-weight="600" fill="#334155">PYTHON BACKEND  ·  harness_manager/</text>
    <rect x="40" y="12" width="900" height="110" rx="10" fill="url(#hm-backend)" stroke="#7c3aed" stroke-width="1.5"/>

    <g font-size="11" fill="#1e1b4b">
      <g transform="translate(70,40)">
        <text font-weight="700" fill="#5b21b6">schema.py</text>
        <text y="16">validates each</text>
        <text y="30">adapter.json</text>
      </g>
      <g transform="translate(220,40)">
        <text font-weight="700" fill="#5b21b6">install.py</text>
        <text y="16">applies file entries</text>
        <text y="30">per merge_policy</text>
      </g>
      <g transform="translate(370,40)">
        <text font-weight="700" fill="#5b21b6">state.py</text>
        <text y="16">install.json read-modify-</text>
        <text y="30">write under fcntl/msvcrt lock</text>
      </g>
      <g transform="translate(560,40)">
        <text font-weight="700" fill="#5b21b6">post_install.py</text>
        <text y="16">named built-ins</text>
        <text y="30">(openclaw_register…)</text>
      </g>
      <g transform="translate(720,40)">
        <text font-weight="700" fill="#5b21b6">doctor.py + remove.py</text>
        <text y="16">audit + safe uninstall</text>
        <text y="30">shared-file detection</text>
      </g>
    </g>
  </g>

  <!-- Arrow down to adapters -->
  <path d="M 490 372 L 490 402" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#hm-arr)"/>

  <!-- Layer 3: 10 adapters -->
  <g transform="translate(0,402)">
    <text x="40" y="0" font-size="12" font-weight="600" fill="#334155">10 ADAPTERS  ·  manifest = adapter.json</text>
    <g font-size="10" fill="#0f172a">
      <g transform="translate(40,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">claude-code</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">CLAUDE.md+hooks</text>
      </g>
      <g transform="translate(132,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">cursor</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">.cursor/rules</text>
      </g>
      <g transform="translate(224,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">windsurf</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">.windsurfrules</text>
      </g>
      <g transform="translate(316,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">opencode</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">opencode.json</text>
      </g>
      <g transform="translate(408,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">openclaw</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">.openclaw-system</text>
      </g>
      <g transform="translate(500,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">hermes</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">AGENTS.md</text>
      </g>
      <g transform="translate(592,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">pi</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">.pi/extensions</text>
      </g>
      <g transform="translate(684,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">codex</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">.agents/skills</text>
      </g>
      <g transform="translate(776,12)">
        <rect width="86" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="43" y="18" text-anchor="middle" font-weight="600">standalone-py</text>
        <text x="43" y="32" text-anchor="middle" font-size="9" fill="#64748b">run.py</text>
      </g>
      <g transform="translate(868,12)">
        <rect width="80" height="40" rx="6" fill="#fff" stroke="#94a3b8"/>
        <text x="40" y="18" text-anchor="middle" font-weight="600">antigravity</text>
        <text x="40" y="32" text-anchor="middle" font-size="9" fill="#64748b">ANTIGRAVITY.md</text>
      </g>
    </g>
  </g>

  <!-- Arrows from each adapter to brain -->
  <g stroke="#94a3b8" stroke-width="0.8" fill="none" opacity="0.45">
    <path d="M 83 466 L 490 530"/>
    <path d="M 175 466 L 490 530"/>
    <path d="M 267 466 L 490 530"/>
    <path d="M 359 466 L 490 530"/>
    <path d="M 451 466 L 490 530"/>
    <path d="M 543 466 L 490 530"/>
    <path d="M 635 466 L 490 530"/>
    <path d="M 727 466 L 490 530"/>
    <path d="M 819 466 L 490 530"/>
    <path d="M 908 466 L 490 530"/>
  </g>

  <!-- Brain -->
  <g transform="translate(40,520)">
    <rect width="900" height="80" rx="10" fill="url(#hm-brain)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">.agent/ — the portable brain</text>
    <text x="450" y="46" text-anchor="middle" font-size="11" fill="#92400e">memory · skills · protocols · install.json (tracks every adapter, every file written)</text>
    <text x="450" y="64" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">condition once — every harness sees the same PREFERENCES, LESSONS, AGENT_LEARNINGS next session</text>
  </g>
</svg>
